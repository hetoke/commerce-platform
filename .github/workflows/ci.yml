name: Node.js CI - Backend Only

on:
  push:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:


      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Debug file structure
        run: |
          pwd
          ls -la
          ls -la backend/

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Create .env files
        run: |
          cd backend
          echo "JWT_ACCESS_SECRET=super-secret-access-key" >> .env
          echo "JWT_REFRESH_SECRET=super-secret-refresh-key" >> .env
          echo "NODE_ENV=test" >> .env
          cp .env .env.test
          echo "SUPABASE_URL=https://fake.supabase.co" >> .env.test
          echo "SUPABASE_SERVICE_ROLE_KEY=fake-service-role-key" >> .env.test
          

      - name: Run backend tests
        run: |
          cd backend
          npm test
